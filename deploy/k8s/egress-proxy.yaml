# Sole egress path for agent-runner Job pods (ADR-025, translated to k8s:
# NetworkPolicy replaces the compose `internal: true` Docker network as the
# mechanism forcing runner traffic through here -- see networkpolicy.yaml).
# Translated from docker-compose.yml's egress-proxy service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-proxy
  namespace: 7mimi-agent
  labels:
    app.kubernetes.io/name: egress-proxy
    app.kubernetes.io/part-of: 7mimi-agent
    app.kubernetes.io/component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: egress-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egress-proxy
        app.kubernetes.io/part-of: 7mimi-agent
        app.kubernetes.io/component: proxy
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      # Pod Security "restricted" equivalent (Issue #29 hardening pass). No
      # explicit runAsUser: services/egress-proxy/Dockerfile builds FROM
      # gcr.io/distroless/static-debian12:nonroot, which already defaults to
      # a non-zero UID -- runAsNonRoot: true just asserts that stays true
      # rather than hardcoding a UID this manifest doesn't own.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: egress-proxy
          image: ghcr.io/7milch/7mimi-agent-egress-proxy
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 18082
          env:
            - name: EGRESS_DENY_HOSTS
              value: api.anthropic.com
          livenessProbe:
            exec:
              command: ["/egress-proxy", "-healthcheck"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["/egress-proxy", "-healthcheck"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: egress-proxy
  namespace: 7mimi-agent
  labels:
    app.kubernetes.io/name: egress-proxy
    app.kubernetes.io/part-of: 7mimi-agent
spec:
  selector:
    app.kubernetes.io/name: egress-proxy
  ports:
    - name: http
      port: 18082
      targetPort: http
