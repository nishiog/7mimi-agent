name: test

# Runs the Python unit test suite on every PR and every push to main.
# config-validate.yaml additionally required-checks config/** changes with
# the same test run plus `config validate`; this workflow is the general
# regression gate so a change outside config/** (e.g. src/**, deploy/**,
# .github/**) can't merge with a broken test suite either.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e .

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
        env:
          PYTHONPATH: src
